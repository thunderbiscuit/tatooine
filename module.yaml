product: jvm/app

dependencies:
  # Ktor
  - io.ktor:ktor-server-netty
  - io.ktor:ktor-server-auth
  - io.ktor:ktor-server-config-yaml
  - io.ktor:ktor-server-content-negotiation
  - io.ktor:ktor-serialization-kotlinx-json

  # Logging
  - ch.qos.logback:logback-classic:1.5.21
  - io.github.oshai:kotlin-logging-jvm:8.0.4

  # Bitcoin
  - org.bitcoindevkit:bdk-jvm:3.0.0

settings:
  publishing:
    name: tatooine
    group: com.coyotebitcoin
    version: 2.2.0
  kotlin:
    version: 2.4.0
    serialization:
      enabled: true
  ktor:
    enabled: true
    applyBom: true
    version: 3.5.0
  jvm:
    mainClass: com.coyotebitcoin.tatooine.ApplicationKt
